name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync GitHub secrets to Fly.io
        run: |
          flyctl secrets set \
            ALPHAVANTAGE_API_KEY="${{ secrets.ALPHAVANTAGE_API_KEY }}" \
            FMP_API_KEY="${{ secrets.FMP_API_KEY }}" \
            EODHD_API_KEY="${{ secrets.EODHD_API_KEY }}" \
            FRED_API_KEY="${{ secrets.FRED_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
            GEOPOLITICAL_RISK_FRED_SERIES_ID="${{ secrets.GEOPOLITICAL_RISK_FRED_SERIES_ID }}" \
            GEOPOLITICAL_RISK_SERIES_NAME="${{ secrets.GEOPOLITICAL_RISK_SERIES_NAME }}" \
            RUN_SCHEDULER="true" \
            --app "${{ vars.FLY_APP_NAME }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml --app "${{ vars.FLY_APP_NAME }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
