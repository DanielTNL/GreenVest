name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s tests

      - name: Diagnostics smoke
        env:
          PYTHONPATH: .
        run: |
          python - <<'PY'
          from audits.diagnostics import run_backend_diagnostics
          from config.settings import Settings

          diagnostics = run_backend_diagnostics(Settings())
          assert diagnostics["econometrics"]["risk_engine"]["operational"] is True
          assert "readiness" in diagnostics
          assert "cloud_deploy_ready" in diagnostics["readiness"]
          print("Diagnostics smoke passed.")
          PY

  ios-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build iOS app
        run: |
          xcodebuild \
            -project ui/ios/GreenVest.xcodeproj \
            -scheme GreenVest \
            -destination 'generic/platform=iOS Simulator' \
            build
